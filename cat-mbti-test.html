<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>🐱 16猫格恋爱MBTI测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{overflow-x:hidden;}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(170deg,#FFF6F8 0%,#FFF0F3 25%,#FFE8EE 55%,#FFF2F5 80%,#FFF8F9 100%);
  background-attachment:fixed;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:0 0 40px 0;
  padding-bottom:calc(40px + env(safe-area-inset-bottom));
  color:#333;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  -webkit-user-select:none;
  user-select:none;
}
img{pointer-events:none;-webkit-user-drag:none;}
.container{
  width:100%;
  max-width:480px;
  margin:0 auto;
  padding:16px;
  padding-left:max(16px, env(safe-area-inset-left));
  padding-right:max(16px, env(safe-area-inset-right));
}
.page{display:none;flex-direction:column;align-items:center;width:100%;}
.page.active{display:flex;}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.fade-in{animation:fadeIn .5s ease}
.slide-up{animation:slideUp .6s ease}

/* ===== Home Page ===== */
.home-title{
  font-size:26px;
  font-weight:800;
  text-align:center;
  margin:48px 0 8px;
  color:#333;
  letter-spacing:-0.5px;
}
.home-subtitle{
  font-size:14px;
  color:#999;
  text-align:center;
  margin-bottom:36px;
  line-height:1.5;
}
.gender-select{
  display:flex;
  gap:16px;
  margin:0 0 36px;
  width:100%;
  justify-content:center;
}
.gender-option{
  display:flex;flex-direction:column;align-items:center;
  width:45%;cursor:pointer;
  transition:all .2s;
  background:#fff;
  border-radius:20px;
  padding:20px 12px 16px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  border:2px solid transparent;
}
.gender-option:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.1);}
.gender-option:active{transform:scale(.96);}
.gender-option.selected{
  border-color:#FF9500;
  box-shadow:0 4px 18px rgba(255,149,0,.15);
}
.gender-avatar{
  width:80px;height:80px;border-radius:50%;object-fit:cover;
  border:none;box-shadow:none;
  transition:all .3s;
  margin-bottom:8px;
}
.gender-label{font-size:15px;font-weight:600;color:#555;}

/* ===== Buttons ===== */
.btn{
  padding:14px 40px;border:none;border-radius:100px;font-size:17px;font-weight:700;
  color:#fff;cursor:pointer;transition:all .3s;
  background:#FF9500;
  box-shadow:0 4px 15px rgba(255,149,0,.3);
  width:80%;
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,149,0,.4);}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-secondary{
  background:#fff;
  color:#FF9500;
  border:2px solid #FF9500;
  box-shadow:none;
}
.btn-secondary:hover{background:#FFF5F0;box-shadow:none;}
.btn-outline{
  background:transparent;
  border:none;
  color:#999;
  box-shadow:none;
  padding:12px 30px;
  font-weight:500;
  font-size:15px;
}
.btn-outline:hover{color:#666;background:none;box-shadow:none;}
.btn-small{padding:10px 24px;font-size:14px;}

/* ===== Question Page ===== */
.question-header{
  width:100%;margin-bottom:20px;
}
.progress-bar-wrap{
  width:100%;height:4px;background:#f0e0e0;border-radius:2px;overflow:hidden;margin-bottom:10px;
}
.progress-bar{
  height:100%;background:#FF9500;border-radius:2px;
  transition:width .4s ease;
}
.question-num{font-size:13px;color:#999;text-align:center;}
.question-card{
  background:#fff;border-radius:20px;padding:30px 24px;width:100%;
  box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;
}
.question-text{
  font-size:18px;font-weight:600;color:#333;text-align:center;
  margin-bottom:24px;line-height:1.6;
}
.option-btn{
  width:100%;padding:14px 18px;border:2px solid #f0e8e8;border-radius:14px;
  background:#fff;font-size:14px;color:#333;cursor:pointer;
  transition:all .3s;margin-bottom:10px;text-align:left;
  line-height:1.6;
}
.option-btn:hover{
  border-color:#FF9500;background:#FFF8F0;
  transform:translateY(-1px);box-shadow:0 2px 10px rgba(255,149,0,.1);
}
.option-btn:active{transform:scale(.98);opacity:.8;}
.option-btn.selected{
  border-color:#FF9500;background:#FFF5F0;
  color:#333;font-weight:600;
}

/* ===== Result Page ===== */
.result-card{
  background:#fff;border-radius:20px;padding:30px 24px;width:100%;
  box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;margin-bottom:20px;
}
.result-cat-img{
  width:180px;height:180px;border-radius:16px;object-fit:contain;
  margin:0 auto 16px;display:block;
}
.result-cat-name{
  font-size:26px;font-weight:800;margin-bottom:4px;
}
.result-mbti-badge{
  display:inline-block;padding:4px 16px;border-radius:100px;font-size:14px;
  font-weight:700;color:#fff;margin-bottom:10px;
  background:#FF9500;
}
.result-tagline{
  font-size:15px;color:#666;font-style:italic;margin-bottom:16px;
  line-height:1.5;
}
.result-desc{
  font-size:14px;color:#555;line-height:1.8;text-align:left;
  margin-bottom:20px;padding:0 4px;
}
.match-section{
  width:100%;background:#fff;border-radius:20px;padding:24px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;
}
.match-title{
  font-size:18px;font-weight:700;color:#FF6B35;margin-bottom:8px;text-align:center;
}
.match-phrase{
  font-size:14px;color:#FF8FAB;text-align:center;margin-bottom:16px;
  line-height:1.6;padding:0 8px;
}
.match-item{
  display:flex;align-items:center;gap:14px;padding:12px;
  background:#FFF8F5;border-radius:14px;margin-bottom:10px;
}
.match-item:last-child{margin-bottom:0;}
.match-cat-img{
  width:60px;height:60px;border-radius:10px;object-fit:contain;flex-shrink:0;
}
.match-info{flex:1;}
.match-cat-name{font-size:15px;font-weight:700;color:#333;}
.match-reason{font-size:13px;color:#999;margin-top:2px;line-height:1.4;}
.result-buttons{
  display:flex;flex-direction:column;gap:12px;width:100%;margin-bottom:20px;
}
.result-buttons .btn{width:80%;}

/* ===== Product Section ===== */
.product-section{
  width:100%;margin-bottom:20px;
}
.product-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  background:#FFF5F0;
  border-radius:16px 16px 0 0;
}
.product-header-label{
  font-size:12px;
  font-weight:700;
  color:#999;
  letter-spacing:3px;
  text-transform:uppercase;
}
.product-header-tag{
  font-size:12px;
  font-weight:700;
  color:#E91E63;
  background:#fff;
  padding:3px 10px;
  border-radius:100px;
}
.product-card{
  background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.product-img{
  width:100%;aspect-ratio:1/1;object-fit:cover;display:block;
}
.product-card .product-card-body{padding:16px;text-align:center;}
.product-card .product-card-body p{font-size:13px;color:#888;line-height:1.5;}

/* ===== Engagement Section ===== */
.engagement-section{
  width:100%;background:#fff;border-radius:16px;padding:24px 20px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:center;margin-bottom:20px;
}
.engagement-section p{
  font-size:14px;color:#666;line-height:2;
}
.social-row{
  display:flex;justify-content:center;gap:32px;margin-top:18px;
}
.social-circle{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  text-decoration:none;color:#666;font-size:12px;
  transition:transform .2s;
}
.social-circle:active{transform:scale(.92);}
.social-icon{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transition:transform .2s;
}
.social-circle:hover .social-icon{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
.xhs-icon{background:#FFF0F2;}
.dy-icon{background:#F5F5F5;}

/* ===== Gallery Page ===== */
.gallery-title{
  font-size:24px;font-weight:800;color:#333;margin:20px 0 20px;text-align:center;
}
.gallery-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin-bottom:20px;
}
.gallery-item{
  border-radius:16px;padding:12px 8px 10px;text-align:center;
  cursor:pointer;transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.gallery-item:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1);}
.gallery-item img{
  width:100%;aspect-ratio:1;object-fit:contain;border-radius:10px;margin-bottom:6px;
}
.gallery-item .g-name{font-size:11px;font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gallery-item .g-type{font-size:10px;color:#999;}
.gallery-back-btn{margin-bottom:30px;}

/* ===== Gallery Detail Modal ===== */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.45);z-index:100;justify-content:center;align-items:center;
  padding:20px;
}
.modal-overlay.active{display:flex;}
.modal-content{
  background:#fff;border-radius:24px;padding:32px 24px 28px;max-width:380px;width:100%;
  max-height:85vh;max-height:85dvh;overflow-y:auto;position:relative;
  -webkit-overflow-scrolling:touch;
}
.modal-close{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:#F0F0F0;border:none;font-size:18px;cursor:pointer;
  color:#333;display:flex;align-items:center;justify-content:center;
  line-height:1;
}
.modal-subtitle{
  font-size:11px;font-weight:400;color:#bbb;letter-spacing:4px;text-transform:uppercase;
  text-align:center;margin-bottom:16px;
}
.modal-cat-img{
  width:160px;height:160px;border-radius:16px;object-fit:contain;
  margin:0 auto 12px;display:block;
}
.modal-cat-name{font-size:24px;font-weight:800;text-align:center;margin-bottom:6px;}
.modal-mbti-badge{
  display:inline-block;padding:4px 16px;border-radius:100px;font-size:13px;
  font-weight:700;color:#fff;margin-bottom:10px;
  background:#FF9500;
}
.modal-tagline-chip{
  display:inline-block;padding:6px 18px;border-radius:100px;font-size:14px;
  font-weight:600;color:#fff;margin-bottom:16px;
}
.modal-quote-box{
  background:#FFF8E7;border-radius:12px;padding:14px 18px;margin-bottom:16px;
  text-align:center;
}
.modal-quote-box p{
  font-size:15px;color:#E8913A;font-weight:600;line-height:1.5;
}
.modal-desc{font-size:14px;color:#666;line-height:1.8;margin-bottom:16px;}
.modal-divider{
  height:1px;background:#F0E8E8;margin:16px 0;
}
.modal-match-title{font-size:15px;font-weight:700;color:#FF6B35;margin-bottom:12px;}
.modal-cta-btn{
  display:block;width:80%;margin:16px auto 0;padding:14px;border:none;
  border-radius:100px;font-size:16px;font-weight:700;color:#fff;
  background:#FF9500;box-shadow:0 4px 15px rgba(255,149,0,.3);
  cursor:pointer;text-align:center;
}
.modal-cta-btn:active{transform:scale(.97);opacity:.85;}

/* ===== Share Overlay ===== */
.share-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;
  padding:20px;
}
.share-overlay.active{display:flex;}
.share-wrapper{
  max-width:375px;width:100%;text-align:center;
  max-height:90vh;max-height:90dvh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.share-card-preview{
  width:100%;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.15);
  margin-bottom:16px;
}
.share-actions{display:flex;gap:12px;justify-content:center;}
.share-close-btn{
  position:absolute;top:12px;right:16px;font-size:28px;cursor:pointer;
  color:#999;background:none;border:none;line-height:1;
}
.share-overlay-inner{position:relative;}

/* ===== Gender cat avatars ===== */
.gender-cat-img{
  width:100px;height:100px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
  overflow:hidden;
}
.gender-cat-img img{
  width:100%;height:100%;object-fit:contain;border-radius:12px;
}

/* ===== Floating Hearts & Flowers Background ===== */
.hearts-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
  filter:blur(0.3px);
}
.heart-particle{
  position:absolute;
  animation:floatUp linear infinite;
  will-change:transform,opacity;
  text-shadow:0 0 4px rgba(255,180,200,.15);
}
@keyframes floatUp{
  0%{transform:translateY(105vh) translateX(0) scale(.5) rotate(0deg);opacity:0;}
  6%{opacity:.35;}
  20%{transform:translateY(80vh) translateX(15px) scale(.65) rotate(12deg);opacity:.32;}
  40%{transform:translateY(58vh) translateX(-12px) scale(.78) rotate(-8deg);opacity:.30;}
  60%{transform:translateY(38vh) translateX(10px) scale(.88) rotate(14deg);opacity:.28;}
  80%{transform:translateY(18vh) translateX(-8px) scale(.95) rotate(-10deg);opacity:.22;}
  94%{opacity:.10;}
  100%{transform:translateY(-8vh) translateX(4px) scale(1) rotate(20deg);opacity:0;}
}
.heart-particle.sway-alt{
  animation:floatUpAlt linear infinite;
}
@keyframes floatUpAlt{
  0%{transform:translateY(105vh) translateX(0) scale(.45) rotate(0deg);opacity:0;}
  6%{opacity:.32;}
  20%{transform:translateY(76vh) translateX(-14px) scale(.6) rotate(-10deg);opacity:.30;}
  40%{transform:translateY(52vh) translateX(18px) scale(.75) rotate(6deg);opacity:.28;}
  60%{transform:translateY(32vh) translateX(-10px) scale(.88) rotate(-14deg);opacity:.25;}
  80%{transform:translateY(14vh) translateX(12px) scale(.96) rotate(10deg);opacity:.20;}
  94%{opacity:.08;}
  100%{transform:translateY(-6vh) translateX(-6px) scale(1.02) rotate(-18deg);opacity:0;}
}
.heart-particle.sway-slow{
  animation:floatUpSlow linear infinite;
}
@keyframes floatUpSlow{
  0%{transform:translateY(108vh) translateX(0) scale(.4) rotate(0deg);opacity:0;}
  8%{opacity:.28;}
  30%{transform:translateY(70vh) translateX(10px) scale(.55) rotate(8deg);opacity:.26;}
  50%{transform:translateY(48vh) translateX(-8px) scale(.7) rotate(-6deg);opacity:.24;}
  70%{transform:translateY(28vh) translateX(6px) scale(.82) rotate(10deg);opacity:.20;}
  90%{opacity:.10;}
  100%{transform:translateY(-10vh) translateX(-4px) scale(.9) rotate(15deg);opacity:0;}
}
@media(prefers-reduced-motion:reduce){
  .heart-particle{animation:none;display:none;}
}
</style>
</head>

// ==================== STATE ====================
let currentQuestion = 0;
let answers = [];
let selectedGender = '';
let resultType = '';
let previousPage = '';

// ==================== PAGE NAVIGATION ====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var page = document.getElementById(pageId);
  if (page) {
    page.classList.add('active');
    page.classList.remove('fade-in', 'slide-up');
    void page.offsetWidth;
    page.classList.add('fade-in');
  }
  window.scrollTo(0, 0);
}

// ==================== HOME PAGE ====================
function selectGender(el) {
  document.querySelectorAll('.gender-option').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  selectedGender = el.getAttribute('data-gender');
}

function startTest() {
  if (!selectedGender) {
    alert('请先选择你的性别哦~ 🐱');
    return;
  }
  currentQuestion = 0;
  answers = [];
  showPage('questionPage');
  renderQuestion();
}

// ==================== QUESTION PAGE ====================
function renderQuestion() {
  var q = QUESTIONS[currentQuestion];
  document.getElementById('progressBar').style.width = ((currentQuestion + 1) / QUESTIONS.length * 100) + '%';
  document.getElementById('questionNum').textContent = (currentQuestion + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('questionText').textContent = q.q;

  var container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  var labels = ['A', 'B', 'C', 'D'];
  var keys = ['a', 'b', 'c', 'd'];
  for (var i = 0; i < 4; i++) {
    var opt = document.createElement('button');
    opt.className = 'option-btn';
    opt.textContent = labels[i] + '. ' + q[keys[i]].text;
    opt.setAttribute('data-choice', keys[i]);
    (function(choice) {
      opt.onclick = function() { selectAnswer(choice); };
    })(keys[i]);
    container.appendChild(opt);
  }

  var card = document.getElementById('questionCard');
  card.classList.remove('slide-up');
  void card.offsetWidth;
  card.classList.add('slide-up');
}

function selectAnswer(choice) {
  answers[currentQuestion] = choice;
  var btns = document.querySelectorAll('.option-btn');
  btns.forEach(function(b) { b.classList.remove('selected'); });
  btns.forEach(function(b) {
    if (b.getAttribute('data-choice') === choice) b.classList.add('selected');
  });

  setTimeout(function() {
    currentQuestion++;
    if (currentQuestion < QUESTIONS.length) {
      renderQuestion();
    } else {
      calculateResult();
    }
  }, 400);
}

// ==================== SCORING ====================
function calculateResult() {
  var scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

  for (var i = 0; i < answers.length; i++) {
    var ans = answers[i];
    var q = QUESTIONS[i];
    var opt = q[ans];
    if (opt && opt.scores) {
      var s = opt.scores;
      if (s.E) scores.E += s.E;
      if (s.I) scores.I += s.I;
      if (s.S) scores.S += s.S;
      if (s.N) scores.N += s.N;
      if (s.T) scores.T += s.T;
      if (s.F) scores.F += s.F;
      if (s.J) scores.J += s.J;
      if (s.P) scores.P += s.P;
    }
  }

  var mbti = '';
  mbti += (scores.E >= scores.I) ? 'E' : 'I';
  mbti += (scores.S >= scores.N) ? 'S' : 'N';
  mbti += (scores.T >= scores.F) ? 'T' : 'F';
  mbti += (scores.J >= scores.P) ? 'J' : 'P';

  resultType = mbti;
  renderResult();
  showPage('resultPage');
}

// ==================== RESULT PAGE ====================
function renderResult() {
  var cat = CAT_TYPES[resultType];
  var matchList = MATCH_MAP[resultType] || [];
  var card = document.getElementById('resultCard');
  card.innerHTML =
    '<img class="result-cat-img" src="' + CAT_IMAGES[resultType] + '" alt="' + cat.name + '">' +
    '<div class="result-cat-name" style="color:' + cat.color + '">' + cat.name + '</div>' +
    '<div class="result-mbti-badge" style="background:' + cat.color + '">' + resultType + '</div>' +
    '<div class="result-tagline">' + cat.tagline + '</div>' +
    '<div class="result-desc">' + cat.description + '</div>';

  var matchSection = document.getElementById('matchSection');
  // Get group phrase for this type
  var groupPhrase = '';
  for (var gi = 0; gi < MATCH_GROUPS.length; gi++) {
    if (MATCH_GROUPS[gi].members.indexOf(resultType) !== -1) {
      groupPhrase = MATCH_GROUPS[gi].phrase;
      break;
    }
  }
  var matchHTML = '<div class="match-title">💖 最适配的猫猫</div>';
  if (groupPhrase) {
    matchHTML += '<div class="match-phrase">' + groupPhrase + '</div>';
  }
  for (var i = 0; i < matchList.length; i++) {
    var mType = matchList[i];
    var mCat = CAT_TYPES[mType];
    matchHTML +=
      '<div class="match-item">' +
        '<img class="match-cat-img" src="' + CAT_IMAGES[mType] + '" alt="' + mCat.name + '">' +
        '<div class="match-info">' +
          '<div class="match-cat-name" style="color:' + mCat.color + '">' + mCat.name + ' (' + mType + ')</div>' +
          '<div class="match-reason">' + mCat.tagline + '</div>' +
        '</div>' +
      '</div>';
  }
  matchSection.innerHTML = matchHTML;
}

}

function getCachedImage(type) {
  var imgs = document.querySelectorAll('img[src="' + CAT_IMAGES[type] + '"]');
  if (imgs.length > 0) return imgs[0];
  return null;
}

function tryDrawMatchImage(ctx, type, x, y, w, h) {
  var img = getCachedImage(type);
  if (img && img.complete && img.naturalWidth > 0) {
    drawImageContain(ctx, img, x, y, w, h);
    return true;
  }
  return false;
}

function drawImageContain(ctx, img, x, y, w, h) {
  var iw = img.naturalWidth;
  var ih = img.naturalHeight;
  if (!iw || !ih) return;
  var scale = Math.min(w / iw, h / ih);
  var sw = iw * scale;
  var sh = ih * scale;
  var sx = x + (w - sw) / 2;
  var sy = y + (h - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  var chars = text.split('');
  var line = '';
  var lines = [];
  for (var i = 0; i < chars.length; i++) {
    var testLine = line + chars[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line.length > 0) {
      lines.push(line);
      line = chars[i];
    } else {
      line = testLine;
    }
  }
  lines.push(line);
  for (var j = 0; j < lines.length; j++) {
    ctx.fillText(lines[j], x, y + j * lineHeight);
  }
  return lines.length * lineHeight;
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('active');
}

function saveShareCard() {
  var canvas = document.getElementById('shareCanvas');
  try {
    var link = document.createElement('a');
    link.download = '我的恋爱MBTI-' + resultType + '-' + CAT_TYPES[resultType].name + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('请长按图片保存~ 📸');
  }
}

// Close share on overlay click
document.getElementById('shareOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeShare();
});

// ===== Floating Hearts & Flowers Background =====
(function(){
  var container = document.getElementById('heartsBg');
  var hearts = ['♥','♡','❤','🩷','♥','♡'];
  var flowers = ['✿','❀','🌸','✿','❀','🌸','💮','🩷'];
  var tiny = ['·','∘','⊹','·','∘'];
  var allItems = hearts.concat(flowers).concat(tiny);
  // Low-saturation soft pink palette, ~30% opacity
  var colors = [
    'rgba(255,160,185,.28)',
    'rgba(255,140,170,.25)',
    'rgba(255,180,200,.22)',
    'rgba(255,120,160,.20)',
    'rgba(255,200,215,.26)',
    'rgba(255,170,190,.24)',
    'rgba(250,195,210,.22)',
    'rgba(255,150,175,.18)',
    'rgba(248,210,220,.20)'
  ];
  var swayClasses = ['', 'sway-alt', 'sway-slow'];
  var count = 35;
  for(var i = 0; i < count; i++){
    var el = document.createElement('span');
    el.className = 'heart-particle';
    // Assign sway class
    var sway = swayClasses[Math.floor(Math.random() * swayClasses.length)];
    if (sway) el.className += ' ' + sway;
    el.textContent = allItems[Math.floor(Math.random() * allItems.length)];
    // Size variation: tiny dots 8-12px, flowers 14-20px, hearts 16-26px
    var charType = el.textContent;
    var size;
    if (tiny.indexOf(charType) !== -1) {
      size = 8 + Math.random() * 6;
    } else if (flowers.indexOf(charType) !== -1) {
      size = 13 + Math.random() * 8;
    } else {
      size = 15 + Math.random() * 12;
    }
    el.style.fontSize = size + 'px';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.left = Math.random() * 100 + '%';
    // Slow, gentle floating: 14-28s
    var baseDuration = 14 + Math.random() * 14;
    el.style.animationDuration = baseDuration + 's';
    el.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(el);
  }
})();
</script>
